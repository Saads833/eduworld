<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
    <title>EduWorld</title>
</head>
<body>

    <div id="logo">
        <h1>🌍 EduWorld</h1>
    </div>

    <div id="step1">
        <h1>Where did you find EduWorld? 🌍🌐</h1>
        <label>
            <input type="radio" name="source" value="friend"> From a friend
        </label><br>
        <label>
            <input type="radio" name="source" value="parents"> From my parents
        </label><br>
        <label>
            <input type="radio" name="source" value="school"> From school
        </label><br>
        <label>
            <input type="radio" name="source" value="other"> Other:
            <input type="text" name="other_source" placeholder="Type here...">
        </label><br>
        <button id="next1">Next</button>
    </div>

    <div id="step2">
        <h1>What is your grade?</h1>
        <label>
            <input type="radio" name="grade" value="1"> 1st grade
        </label><br>
        <label>
            <input type="radio" name="grade" value="2"> 2nd grade
        </label><br>
        <label>
            <input type="radio" name="grade" value="3"> 3rd grade
        </label><br>
        <label>
            <input type="radio" name="grade" value="4"> 4th grade
        </label><br>
        <label>
            <input type="radio" name="grade" value="5"> 5th grade
        </label><br>
        <label>
            <input type="radio" name="grade" value="6"> 6th grade
        </label><br>
        <button id="next2">Next</button>
    </div>

    <div id="step3">
        <button class="button button1" id="loginBtn">LOGIN</button>
        <button class="button button2" id="signinBtn">SIGN IN</button>
    </div>

    <div id="signInForm">
        <h1>Create Your Account 🌍</h1>
        <input type="text" id="fullname" placeholder="Your name..."><br><br>
        <input type="email" id="username" placeholder="Your email..."><br><br>
        <input type="password" id="password" placeholder="Create a password..."><br><br>
        <button id="createBtn">CREATE MY ACCOUNT</button>
    </div>

    <div id="loginForm">
        <h1>Welcome Back! 🌍</h1>
        <input type="email" id="loginUsername" placeholder="Your email..."><br><br>
        <input type="password" id="loginPassword" placeholder="Your password..."><br><br>
        <button id="loginSubmit">LOGIN</button>
    </div>

    <div id="welcome">
        <h1>Welcome to EduWorld! 🌍</h1>
        <p id="welcomeMessage"></p>
        <button id="playBtn">START PLAYING! 🎮</button>
    </div>

    <div id="homeScreen">

    <!-- Left Sidebar -->
    <div id="sidebar">
        <div id="homeBtn">🏠</div>
        <div id="avatarBtn">👤</div>
        <div id="menuBtn">•••</div>
    </div>

    <!-- Main Content -->
    <div id="mainContent">
        <h2>🎮 Recommended</h2>
        <div id="gamesGrid">
            <div class="gameCard">📐 Math</div>
            <div class="gameCard">⚗️ Physics</div>
            <div class="gameCard">🇫🇷 French</div>
            <div class="gameCard">📖 History</div>
            <div class="gameCard">🌍 Geography</div>
            <div class="gameCard">🔬 Science</div>
        </div>
    </div>

    <!-- Dropdown Menu (hidden by default) -->
    <div id="dropMenu">
        <button id="systemBtn">⚙️ System</button>
        <button id="logoutBtn">🚪 Logout</button>
        <button id="exitBtn">🚫 Exit</button>
    </div>

</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyALbQ2ieNt28SLiy7RUx2WtrEs95AZ9ZIc",
            authDomain: "eduworld-1be9c.firebaseapp.com",
            projectId: "eduworld-1be9c",
            storageBucket: "eduworld-1be9c.firebasestorage.app",
            messagingSenderId: "729052709954",
            appId: "1:729052709954:web:00050fb1cdab09112f59db"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.firebaseAuth = auth;
        window.createUser = createUserWithEmailAndPassword;
        window.signInUser = signInWithEmailAndPassword;
    </script>

</body>
</html>
